# Fly.io config for the vid-transfer relay.
# Initialize with: fly launch --no-deploy --copy-config --name <yours>
# Then: fly deploy

app = "vid-transfer-relay"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  HOST = "0.0.0.0"
  VIDX_SESSION_TTL_SEC = "300"
  VIDX_MAX_CIPHERTEXT = "327680"
  VIDX_RATE_LIMIT_MAX = "60"
  VIDX_RATE_LIMIT_WINDOW_SEC = "60"
  VIDX_TRUST_PROXY = "true"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # For a public/demo deploy we keep one machine always-on so cold-start
  # never bites a judge or operator on first request. If you want to save
  # money on a private relay, flip back to:
  #   auto_stop_machines  = "stop"
  #   min_machines_running = 0
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.tcp_checks]]
    grace_period = "5s"
    interval = "15s"
    timeout = "2s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/healthz"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
